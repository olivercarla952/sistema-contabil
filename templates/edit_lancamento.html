{% extends "base.html" %}

{% block content %}

<h1>Editar Lançamento</h1>

<form method="POST">

    {{ csrf_token() if csrf_token is defined }}

    <div class="form-group">
        <label for="data">Data</label>
        <input 
            type="date"
            id="data"
            name="data"
            value="{{ lancamento.data|default('') }}"
            required
        >
    </div>

    <div class="form-group">
        <label for="conta_id">Conta</label>
        <select id="conta_id" name="conta_id" required>
            {% for conta in contas %}
            <option 
                value="{{ conta.id }}"
                {% if conta.id == lancamento.conta_id %}selected{% endif %}
            >
                {{ conta.nome }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="descricao">Descrição</label>
        <input 
            type="text"
            id="descricao"
            name="descricao"
            value="{{ lancamento.descricao|default('') }}"
            required
        >
    </div>

    <div class="form-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" required>
            <option value="Débito" {% if lancamento.tipo == 'Débito' %}selected{% endif %}>
                Débito
            </option>
            <option value="Crédito" {% if lancamento.tipo == 'Crédito' %}selected{% endif %}>
                Crédito
            </option>
        </select>
    </div>

    <div class="form-group">
        <label for="valor">Valor</label>
        <input 
            type="number"
            id="valor"
            name="valor"
            step="0.01"
            min="0"
            value="{{ lancamento.valor|default(0) }}"
            required
        >
    </div>

    <button type="submit">Salvar</button>

</form>

{% endblock %}
